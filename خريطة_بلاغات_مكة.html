<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>خريطة بلاغات أمانة مكة المكرمة</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/leaflet.markercluster.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/MarkerCluster.css"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/MarkerCluster.Default.css"/>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #0d1117; color: #e6edf3; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
  
  #header {
    background: linear-gradient(135deg, #161b22 0%, #0d1117 100%);
    border-bottom: 1px solid #30363d;
    padding: 10px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
    gap: 10px;
    flex-wrap: wrap;
  }
  
  #header h1 {
    font-size: 15px;
    font-weight: 700;
    color: #58a6ff;
    white-space: nowrap;
  }
  
  #stats-bar {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    align-items: center;
  }
  
  .stat-chip {
    background: #21262d;
    border: 1px solid #30363d;
    border-radius: 20px;
    padding: 4px 12px;
    font-size: 12px;
    display: flex;
    align-items: center;
    gap: 6px;
    white-space: nowrap;
  }
  
  .stat-chip span { color: #58a6ff; font-weight: 700; }
  
  #btn-filter {
    background: #238636;
    color: #fff;
    border: none;
    border-radius: 6px;
    padding: 7px 14px;
    cursor: pointer;
    font-size: 13px;
    font-family: inherit;
    white-space: nowrap;
    display: flex;
    align-items: center;
    gap: 5px;
  }
  #btn-filter:hover { background: #2ea043; }
  
  #main { flex: 1; display: flex; overflow: hidden; position: relative; }
  
  #map { flex: 1; height: 100%; z-index: 1; }
  
  /* Sidebar */
  #sidebar {
    width: 320px;
    background: #161b22;
    border-left: 1px solid #30363d;
    overflow-y: auto;
    z-index: 2;
    transition: transform 0.3s ease;
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
  }
  
  @media (max-width: 768px) {
    #sidebar {
      position: absolute;
      right: 0;
      top: 0;
      bottom: 0;
      width: 85vw;
      max-width: 320px;
      transform: translateX(100%);
      z-index: 1000;
      box-shadow: -4px 0 20px rgba(0,0,0,0.5);
    }
    #sidebar.open { transform: translateX(0); }
    #map { width: 100%; }
  }
  
  #sidebar-header {
    padding: 14px 16px;
    background: #0d1117;
    border-bottom: 1px solid #30363d;
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: sticky;
    top: 0;
    z-index: 1;
  }
  
  #sidebar-header h2 { font-size: 14px; color: #58a6ff; }
  
  #btn-close-sidebar {
    background: none;
    border: 1px solid #30363d;
    color: #8b949e;
    border-radius: 4px;
    width: 28px; height: 28px;
    cursor: pointer;
    font-size: 16px;
    display: flex; align-items: center; justify-content: center;
  }
  
  .filter-section {
    padding: 12px 16px;
    border-bottom: 1px solid #21262d;
  }
  
  .filter-label {
    font-size: 11px;
    color: #8b949e;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 6px;
    font-weight: 600;
  }
  
  select, input[type=date] {
    width: 100%;
    background: #21262d;
    border: 1px solid #30363d;
    color: #e6edf3;
    border-radius: 6px;
    padding: 7px 10px;
    font-size: 13px;
    font-family: inherit;
    outline: none;
    direction: rtl;
  }
  
  select:focus, input[type=date]:focus { border-color: #58a6ff; }
  
  .date-row { display: flex; gap: 8px; }
  .date-row > div { flex: 1; }
  
  .importance-btns {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }
  
  .imp-btn {
    flex: 1;
    min-width: 60px;
    padding: 6px 8px;
    border-radius: 6px;
    border: 2px solid transparent;
    cursor: pointer;
    font-size: 12px;
    font-family: inherit;
    text-align: center;
    transition: all 0.15s;
    font-weight: 600;
  }
  
  .imp-btn.all { background: #21262d; color: #e6edf3; border-color: #30363d; }
  .imp-btn.critical { background: rgba(248,81,73,0.15); color: #f85149; border-color: #f85149; }
  .imp-btn.medium { background: rgba(210,153,34,0.15); color: #d2a81e; border-color: #d2a81e; }
  .imp-btn.normal { background: rgba(63,185,80,0.15); color: #3fb950; border-color: #3fb950; }
  
  .imp-btn.active { opacity: 1; }
  .imp-btn:not(.active) { opacity: 0.4; }
  
  #btn-apply {
    margin: 12px 16px;
    background: #1f6feb;
    color: #fff;
    border: none;
    border-radius: 6px;
    padding: 10px;
    width: calc(100% - 32px);
    cursor: pointer;
    font-size: 14px;
    font-family: inherit;
    font-weight: 600;
  }
  #btn-apply:hover { background: #388bfd; }
  
  #btn-reset {
    margin: 0 16px 16px;
    background: #21262d;
    color: #8b949e;
    border: 1px solid #30363d;
    border-radius: 6px;
    padding: 8px;
    width: calc(100% - 32px);
    cursor: pointer;
    font-size: 13px;
    font-family: inherit;
  }
  #btn-reset:hover { background: #2d333b; color: #e6edf3; }
  
  /* Upload section */
  #upload-section {
    margin: 0 16px 16px;
    border: 2px dashed #30363d;
    border-radius: 8px;
    padding: 16px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s;
  }
  #upload-section:hover { border-color: #58a6ff; }
  #upload-section p { font-size: 12px; color: #8b949e; margin-top: 6px; }
  #upload-section .icon { font-size: 24px; }
  #file-input { display: none; }
  
  /* Loading overlay */
  #loading {
    position: fixed; inset: 0;
    background: rgba(13,17,23,0.9);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 9999;
    gap: 16px;
  }
  
  .spinner {
    width: 48px; height: 48px;
    border: 4px solid #30363d;
    border-top-color: #58a6ff;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  
  #loading p { color: #8b949e; font-size: 14px; }
  
  /* Popup */
  .leaflet-popup-content-wrapper {
    background: #161b22 !important;
    border: 1px solid #30363d !important;
    border-radius: 8px !important;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5) !important;
    color: #e6edf3 !important;
    direction: rtl !important;
  }
  .leaflet-popup-tip { background: #161b22 !important; }
  .leaflet-popup-content { margin: 12px 16px !important; min-width: 220px !important; }
  
  .popup-title { font-size: 13px; font-weight: 700; color: #58a6ff; margin-bottom: 8px; }
  .popup-row { display: flex; gap: 6px; margin-bottom: 4px; font-size: 12px; align-items: flex-start; }
  .popup-key { color: #8b949e; white-space: nowrap; }
  .popup-val { color: #e6edf3; }
  .badge {
    display: inline-block; padding: 2px 8px; border-radius: 10px;
    font-size: 11px; font-weight: 600;
  }
  .badge.حرج { background: rgba(248,81,73,0.2); color: #f85149; border: 1px solid #f85149; }
  .badge.متوسط { background: rgba(210,153,34,0.2); color: #d2a81e; border: 1px solid #d2a81e; }
  .badge.عادي { background: rgba(63,185,80,0.2); color: #3fb950; border: 1px solid #3fb950; }
  
  /* Layer switcher */
  #layer-switcher {
    display: flex;
    gap: 4px;
    background: #21262d;
    border: 1px solid #30363d;
    border-radius: 8px;
    padding: 3px;
  }
  .layer-btn {
    background: transparent;
    border: none;
    color: #8b949e;
    border-radius: 6px;
    padding: 5px 10px;
    cursor: pointer;
    font-size: 12px;
    font-family: inherit;
    white-space: nowrap;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .layer-btn:hover { background: #30363d; color: #e6edf3; }
  .layer-btn.active { background: #1f6feb; color: #fff; }

  /* Overlay for mobile */
  #overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 999; }
  @media (max-width: 768px) {
    #overlay.show { display: block; }
    #btn-filter { padding: 7px 10px; font-size: 12px; }
    #header h1 { font-size: 13px; }
    #layer-switcher { order: 3; width: 100%; justify-content: center; }
    .layer-btn { flex: 1; justify-content: center; }
  }
</style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <p>جاري تحميل البيانات...</p>
</div>

<div id="header">
  <h1>🗺️ خريطة بلاغات أمانة مكة المكرمة</h1>
  <div id="stats-bar">
    <div class="stat-chip">إجمالي: <span id="total-count">0</span></div>
    <div class="stat-chip">معروض: <span id="shown-count">0</span></div>
  </div>
  <div id="layer-switcher">
    <button class="layer-btn active" data-layer="dark" onclick="switchLayer(this)">🌑 مظلم</button>
    <button class="layer-btn" data-layer="satellite" onclick="switchLayer(this)">🛰️ قمر صناعي</button>
    <button class="layer-btn" data-layer="street" onclick="switchLayer(this)">🗺️ شوارع</button>
  </div>
  <button id="btn-filter" onclick="toggleSidebar()">⚙️ فلتر وتحكم</button>
</div>

<div id="main">
  <div id="map"></div>
  <div id="overlay" onclick="toggleSidebar()"></div>
  <div id="sidebar">
    <div id="sidebar-header">
      <h2>⚙️ الفلاتر</h2>
      <button id="btn-close-sidebar" onclick="toggleSidebar()">✕</button>
    </div>
    
    <div class="filter-section">
      <div class="filter-label">البلدية الفرعية</div>
      <select id="f-sub">
        <option value="">كل البلديات</option>
      </select>
    </div>
    
    <div class="filter-section">
      <div class="filter-label">التصنيف</div>
      <select id="f-cls">
        <option value="">كل التصنيفات</option>
      </select>
    </div>
    
    <div class="filter-section">
      <div class="filter-label">مصدر البلاغ</div>
      <select id="f-src">
        <option value="">كل المصادر</option>
      </select>
    </div>
    
    <div class="filter-section">
      <div class="filter-label">الأهمية</div>
      <div class="importance-btns">
        <button class="imp-btn all active" data-val="" onclick="setImp(this)">الكل</button>
        <button class="imp-btn critical active" data-val="حرج" onclick="setImp(this)">🔴 حرج</button>
        <button class="imp-btn medium active" data-val="متوسط" onclick="setImp(this)">🟡 متوسط</button>
        <button class="imp-btn normal active" data-val="عادي" onclick="setImp(this)">🟢 عادي</button>
      </div>
    </div>
    
    <div class="filter-section">
      <div class="filter-label">تاريخ الإنشاء</div>
      <div class="date-row">
        <div><div style="font-size:11px;color:#8b949e;margin-bottom:4px;">من</div><input type="date" id="f-from"></div>
        <div><div style="font-size:11px;color:#8b949e;margin-bottom:4px;">إلى</div><input type="date" id="f-to"></div>
      </div>
    </div>
    
    <button id="btn-apply" onclick="applyFilters()">✅ تطبيق الفلاتر</button>
    <button id="btn-reset" onclick="resetFilters()">↺ إعادة ضبط</button>
    
    <div class="filter-section">
      <div class="filter-label" style="margin-bottom:8px;">🔄 تحديث البيانات</div>
      <div id="upload-section" onclick="document.getElementById('file-input').click()">
        <div class="icon">📂</div>
        <div style="font-size:13px;color:#e6edf3;margin-top:4px;">ارفع ملف Excel جديد</div>
        <p>يدعم ملفات .xlsx</p>
      </div>
      <input type="file" id="file-input" accept=".xlsx" onchange="handleUpload(event)">
    </div>
    
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

// ─── Decompress ───────────────────────────────────────────────────────────────
async function decompress(b64) {
  const bin = atob(b64);
  const bytes = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
  const ds = new DecompressionStream('gzip');
  const writer = ds.writable.getWriter();
  writer.write(bytes);
  writer.close();
  const chunks = [];
  const reader = ds.readable.getReader();
  while (true) {
    const {done, value} = await reader.read();
    if (done) break;
    chunks.push(value);
  }
  const total = chunks.reduce((s, c) => s + c.length, 0);
  const buf = new Uint8Array(total);
  let offset = 0;
  for (const c of chunks) { buf.set(c, offset); offset += c.length; }
  return new TextDecoder().decode(buf);
}

  CLASSIFICATIONS.forEach(v => {

  });
  SOURCES.forEach(v => {
    const o = document.createElement('option'); o.value = v; o.textContent = v;
    fSrc.appendChild(o);
  });
}

// ─── Map ──────────────────────────────────────────────────────────────────────
const TILE_LAYERS = {
  dark: L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '© OpenStreetMap © CARTO', subdomains: 'abcd', maxZoom: 19
  }),
  satellite: L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
    attribution: '© Esri © Maxar', maxZoom: 19
  }),
  street: L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
    attribution: '© OpenStreetMap © CARTO', subdomains: 'abcd', maxZoom: 19
  })
};
let currentLayer = 'dark';

function switchLayer(btn) {
  const layerKey = btn.dataset.layer;
  if (layerKey === currentLayer) return;
  map.removeLayer(TILE_LAYERS[currentLayer]);
  TILE_LAYERS[layerKey].addTo(map);
  TILE_LAYERS[layerKey].bringToBack();
  currentLayer = layerKey;
  document.querySelectorAll('.layer-btn').forEach(b => b.classList.toggle('active', b.dataset.layer === layerKey));
}

function initMap() {
  map = L.map('map', { zoomControl: false }).setView([21.4858, 39.9563], 11);
  
  L.control.zoom({ position: 'bottomleft' }).addTo(map);
  
  TILE_LAYERS.dark.addTo(map);
  
  clusterLayer = L.markerClusterGroup({
    chunkedLoading: true,
    chunkInterval: 100,
    chunkDelay: 50,
    maxClusterRadius: 60,
    spiderfyOnMaxZoom: true,
    showCoverageOnHover: false,
    iconCreateFunction: function(cluster) {
      const count = cluster.getChildCount();
      const size = count > 100 ? 'large' : count > 10 ? 'medium' : 'small';
      const sz = size === 'large' ? 44 : size === 'medium' ? 36 : 28;
      const bg = size === 'large' ? '#f85149' : size === 'medium' ? '#d2a81e' : '#58a6ff';
      return L.divIcon({
        html: `<div style="width:${sz}px;height:${sz}px;background:${bg};border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:${sz < 36 ? 11 : 13}px;border:2px solid rgba(255,255,255,0.3);box-shadow:0 2px 8px rgba(0,0,0,0.4);">${count}</div>`,
        className: '', iconSize: [sz, sz], iconAnchor: [sz/2, sz/2]
      });
    }
  });
  
  map.addLayer(clusterLayer);
}

// ─── Color by importance ─────────────────────────────────────────────────────
function getColor(imp) {
  if (imp === 'حرج') return '#f85149';
  if (imp === 'متوسط') return '#d2a81e';
  return '#3fb950';
}

function makeIcon(imp) {
  const c = getColor(imp);
  return L.divIcon({
    html: `<div style="width:10px;height:10px;background:${c};border-radius:50%;border:1.5px solid rgba(255,255,255,0.6);box-shadow:0 0 4px ${c}88;"></div>`,
    className: '', iconSize: [10, 10], iconAnchor: [5, 5]
  });
}

// ─── Render markers ───────────────────────────────────────────────────────────
function renderMarkers(data) {
  clusterLayer.clearLayers();
  const markers = [];
  
  for (const row of data) {
    const [id, sub, cls, imp, src, desc, x, y, date] = row;
    const marker = L.marker([y, x], { icon: makeIcon(imp) });
    
    marker.bindPopup(`
      <div class="popup-title">${id}</div>
      <div class="popup-row"><span class="popup-key">البلدية:</span><span class="popup-val">${sub}</span></div>
      <div class="popup-row"><span class="popup-key">التصنيف:</span><span class="popup-val">${cls}</span></div>
      <div class="popup-row"><span class="popup-key">المصدر:</span><span class="popup-val">${src}</span></div>
      <div class="popup-row"><span class="popup-key">الأهمية:</span><span class="popup-val"><span class="badge ${imp}">${imp}</span></span></div>
      <div class="popup-row"><span class="popup-key">التاريخ:</span><span class="popup-val">${date}</span></div>
      ${desc ? `<div class="popup-row" style="margin-top:6px;"><span class="popup-key">الوصف:</span><span class="popup-val" style="font-size:11px;color:#8b949e;">${desc}</span></div>` : ''}
    `, { maxWidth: 280 });
    
    markers.push(marker);
  }
  
  clusterLayer.addLayers(markers);
  document.getElementById('shown-count').textContent = data.length.toLocaleString('ar');
}

// ─── Filters ──────────────────────────────────────────────────────────────────
function setImp(btn) {
  activeImp = btn.dataset.val;
  document.querySelectorAll('.imp-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.val === activeImp || (activeImp === '' && b.dataset.val === ''));
  });
  if (activeImp !== '') {
    document.querySelectorAll('.imp-btn.all').forEach(b => b.classList.remove('active'));
  }
}

function applyFilters() {
  const sub = document.getElementById('f-sub').value;
  const cls = document.getElementById('f-cls').value;
  const src = document.getElementById('f-src').value;
  const from = document.getElementById('f-from').value;
  const to = document.getElementById('f-to').value;
  
  let filtered = allData;
  if (sub) filtered = filtered.filter(r => r[1] === sub);
  if (cls) filtered = filtered.filter(r => r[2] === cls);
  if (activeImp) filtered = filtered.filter(r => r[3] === activeImp);
  if (src) filtered = filtered.filter(r => r[4] === src);
  if (from) filtered = filtered.filter(r => r[8] >= from);
  if (to) filtered = filtered.filter(r => r[8] <= to);
  
  renderMarkers(filtered);
  if (window.innerWidth <= 768) toggleSidebar();
}

function resetFilters() {
  document.getElementById('f-sub').value = '';
  document.getElementById('f-cls').value = '';
  document.getElementById('f-src').value = '';
  document.getElementById('f-from').value = '';
  document.getElementById('f-to').value = '';
  activeImp = '';
  document.querySelectorAll('.imp-btn').forEach(b => b.classList.add('active'));
  document.querySelectorAll('.imp-btn.all').forEach(b => b.classList.add('active'));
  renderMarkers(allData);
}

// ─── Sidebar ──────────────────────────────────────────────────────────────────
function toggleSidebar() {
  const sb = document.getElementById('sidebar');
  const ov = document.getElementById('overlay');
  sb.classList.toggle('open');
  ov.classList.toggle('show');
}

// ─── Excel upload ─────────────────────────────────────────────────────────────
function handleUpload(event) {
  const file = event.target.files[0];
  if (!file) return;
  
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const wb = XLSX.read(e.target.result, { type: 'binary' });
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, { header: 1 });
      
      const newData = [];
      const headers = rows[0];
      const xIdx = headers.indexOf('X');
      const yIdx = headers.indexOf('Y');
      const idIdx = 0, subIdx = 6, clsIdx = 8, impIdx = 13, srcIdx = 11, descIdx = 14, dateIdx = 1;
      
      for (let i = 1; i < rows.length; i++) {
        const r = rows[i];
        if (!r[xIdx] || !r[yIdx]) continue;
        const dateStr = r[dateIdx] ? String(r[dateIdx]).substring(0, 10) : '';
        newData.push([
          r[idIdx] || '', r[subIdx] || '', r[clsIdx] || '',
          r[impIdx] || '', r[srcIdx] || '', String(r[descIdx] || '').substring(0, 80),
          parseFloat(r[xIdx]), parseFloat(r[yIdx]), dateStr
        ]);
      }
      
      allData = newData;
      document.getElementById('total-count').textContent = allData.length.toLocaleString('ar');
      renderMarkers(allData);
      alert(`✅ تم تحميل ${newData.length.toLocaleString('ar')} بلاغ بنجاح!`);
    } catch(err) {
      alert('❌ خطأ في قراءة الملف: ' + err.message);
    }
  };
  reader.readAsBinaryString(file);
}

// ─── Init ─────────────────────────────────────────────────────────────────────
async function init() {
  initMap();
  buildFilters();
  
  try {
    const json = await decompress(DATA_B64);
    allData = JSON.parse(json);
    document.getElementById('total-count').textContent = allData.length.toLocaleString('ar');
    document.getElementById('shown-count').textContent = allData.length.toLocaleString('ar');
    renderMarkers(allData);
  } catch(e) {
    console.error(e);
  } finally {
    document.getElementById('loading').style.display = 'none';
  }
}

init();
</script>
